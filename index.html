<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shubhneet's FlavorNest</title>
    <link rel="stylesheet" href="./CSS/style.css">
</head>

<body>
    <!-- Header  -->
    <header>
        <!-- Brand Name  -->
        <div class="brand">
            <span>Shubhneet's FlavorNest</span>
        </div>
        <!-- Navbar  -->
        <nav>
            <ul class="nav-items">
                <li><a href="">Home</a></li>
                <li><a href="">About</a></li>
                <li><a href="">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main section  -->
    <main>
        <div class="recipe-container">
            <div class="heading">
                <h1>Recipes</h1>
            </div>
            <div class="grid">
                <!-- row1 -->

                <div class="card">
                    <img src="./assets/images/dosa.jpg" alt="dosa">
                    <h2>Dosa Recipe</h2>
                </div>
                <div class="card">
                    <img src="./assets/images/samosa.jpg" alt="samosa">
                    <h2>Samosa Recipe</h2>
                </div>
                <div class="card">
                    <img src="./assets/images/momos.jpg" alt="momos">
                    <h2>Momos Recipe</h2>
                </div>
                
                <!-- row2 -->

                <div class="card">
                    <img src="./assets/images/noodles.jpg" alt="noodles">
                    <h2>Noodles Recipe</h2>
                </div>
                <div class="card">
                    <img src="./assets/images/icecream.jpg" alt="icecream">
                    <h2>Mango Ice Cream Recipe</h2>
                </div>
                <div class="card">
                    <img src="./assets/images/cake.jpg" alt="cake">
                    <h2>Cake Recipe</h2>
                </div>
            </div>
        </div>

    </main>

    <!-- Footer section  -->
    <footer>
        Copyright &copy; Shubhneet's FlavorNest Pvt Ltd 2026 All Rights Reserved
    </footer>
</body>

</html>
